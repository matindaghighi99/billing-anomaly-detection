# Streamlit server configuration (hardened defaults for deployment).
[server]
headless = true
enableXsrfProtection = true     # CSRF protection ON (do not disable)
enableCORS = true
maxUploadSize = 5

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#4F46E5"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6FB"
textColor = "#0F172A"
