# Render Blueprint — https://render.com/docs/blueprint-spec
# One-time setup: Render Dashboard → New → Blueprint → connect this repo.
# Render reads this file, builds the Dockerfile, and deploys with HTTPS.
services:
  - type: web
    name: billing-anomaly-audit
    runtime: docker
    plan: free                      # bump to "starter" to avoid idle spin-down
    branch: master
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    autoDeploy: true                # redeploy on every push to the branch
    envVars:
      - key: DATASET
        value: large
      # Stable HMAC key for signing session tokens — Render generates and
      # persists a secure value across deploys.
      - key: SESSION_SECRET
        generateValue: true
      - key: MFA_ENABLED
        value: "1"
      # Demo deployment shows the demo accounts + their live MFA codes so it is
      # usable out of the box. For a real pilot set this to "1" AND supply
      # BAAD_USERS_JSON below.
      - key: HIDE_DEMO_CREDS
        value: "0"
      # Real users (JSON of PBKDF2 + TOTP records); generate with:
      #   python -c "import auth_mock; print(auth_mock.make_user_record('pw','supervisor','Name'))"
      - key: BAAD_USERS_JSON
        sync: false
      # Optional — enables AI-enriched explanations:
      - key: ANTHROPIC_API_KEY
        sync: false
