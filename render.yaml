# Render Blueprint — https://render.com/docs/blueprint-spec
# One-time setup: Render Dashboard → New → Blueprint → connect this repo.
# Render reads this file, builds the Dockerfile, and deploys with HTTPS.
services:
  - type: web
    name: billing-anomaly-audit
    runtime: docker
    plan: free                      # bump to "starter" to avoid idle spin-down
    branch: master
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    autoDeploy: true                # redeploy on every push to the branch
    envVars:
      - key: DATASET
        value: large
      # Stable HMAC key for signing session tokens — Render generates and
      # persists a secure value across deploys.
      - key: SESSION_SECRET
        generateValue: true
      - key: MFA_ENABLED
        value: "1"
      # Demo deployment shows the demo accounts + their live MFA codes so it is
      # usable out of the box. For a real pilot set this to "1" AND supply
      # BAAD_USERS_JSON below.
      - key: HIDE_DEMO_CREDS
        value: "0"
      # Real users (JSON of PBKDF2 + TOTP records); generate with:
      #   python -c "import auth_mock; print(auth_mock.make_user_record('pw','supervisor','Name'))"
      - key: BAAD_USERS_JSON
        sync: false
      # Optional — enables AI-enriched explanations:
      - key: ANTHROPIC_API_KEY
        sync: false
      # ── Operational hardening (PILOT/PRODUCTION) ─────────────────────────
      # For a real pilot, in addition to the above:
      #   - Set APP_ENV=production (the app then FAILS FAST unless SESSION_SECRET
      #     is set, MFA_ENABLED=1, HIDE_DEMO_CREDS=1, and BAAD_USERS_JSON is set).
      #   - Move to a paid plan and attach a persistent disk so the tamper-evident
      #     audit trail + case state survive restarts, e.g.:
      #         disk:
      #           name: data
      #           mountPath: /data
      #           sizeGB: 1
      #     and set DATA_DIR=/data (audit_log.db, audit_cases.db, backups live there).
      #   - Secrets come from Render env (a managed vault) — never the repo.
      #   - Schedule `python backup.py` (Render Cron Job) and sync DATA_DIR/backups
      #     to object storage; wire a log drain + uptime check (/_stcore/health).
      - key: DATA_DIR
        value: "."
